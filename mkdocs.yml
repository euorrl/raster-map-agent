site_name: Raster Map Agent
site_description: 自然语言驱动的遥感制图 Agent 项目
site_author: Raster Map Agent Contributors
docs_dir: docs

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

nav:
  - 首页: index.md
  - 开发阶段记录: development-log.md
  - 项目架构: architecture.md
  - 栅格工具链: raster-toolchain.md
  - 关键设计决策: design-decisions.md
  - 路线图: roadmap.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
